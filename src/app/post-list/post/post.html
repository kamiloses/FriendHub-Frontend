<div class="post-container" [routerLink]="['/post/1']" style="cursor: pointer;">
  <div class="user-data">
<!--    <img src="facebook-icon.jpg" alt="image not loaded">-->
    <p class="name">{{post.user.firstName +" "+ post.user.lastName}}</p>
    <p class="unique-name">&#64;{{post.user.username}}</p>
    <p class="date">{{post.createdAt}}</p>
  </div>
  <div class="post-text">
           {{post.content + " "+ post.id}}


    <div class="interactions">
      <i class="fa fa-comment">0</i>
      <i class="fa fa-retweet"></i> <span>5</span>
      <i class="fa fa-heart"></i> <span>10</span>
    </div>
  </div>
</div>
