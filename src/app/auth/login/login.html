<div class="login-container">
  <h2>Login</h2>
  <form (ngSubmit)="onSubmit()" [formGroup]="loginForm" class="form" >
    <label  for="username">Username:</label>
    <input [class.error]="usernameInvalid" type="text" id="username" name="username" [formControl]="loginForm.controls.username">
    <label for="password">Password:</label>
    <input type="password" id="password" name="password" [formControl]="loginForm.controls.password">
      @if (loginError!=='') {
        <p class="error-message">Problem .</p>

    }
    <button type="submit">Login</button>
  </form>
  <a class="registration-link" [routerLink]="'/register'">Register</a>
</div>
