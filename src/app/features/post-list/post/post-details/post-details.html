@if (postFetchError) {
  <div class="error-container">
    <h2>Error 😕</h2>
    <p>{{ postFetchError }}</p>
  </div>
} @else {


<div  class="post-container">
  <div class="user-data"><img src="facebook-icon.jpg" alt="image not loaded">
    <p class="name">{{postModel.user?.firstName+" "+ postModel.user?.lastName}}</p>
    <p class="unique-name">&#64;{{postModel.user?.username}}</p>
    <p class="date"> 20.04.2024</p>
  </div>
  <div class="post-text">
    {{postModel.content}}
    <div class="interactions">
      <i class="fa fa-retweet"> 0</i>
      <i class="fa fa-heart"> 0</i>
    </div>
  </div>
  <app-comment-list [currentRoute]="a"></app-comment-list>
</div>
}
